apiVersion: optpilot.io/v1
config: method
id: job-shop-rl-stable-baselines
description: Trains a small RL policy on training cases and emits schedule solutions for validation cases.
tags: [job-shop, reinforcement-learning, stable-baselines, schedule-solution]

entrypoint:
  python: method:StableBaselinesJobShopMethod
  pythonPath: [., ..]
  protocol: batch

settings:
  batchSize: 1
  maxJobs: 6
  totalTimesteps: 128
  discountFactor: 0.95
  seed: 0

accepts:
  formats: [parameters]
  requires:
    context:
      - candidate.parameters.schema
      - methodContext.references
    capabilities:
      - schedule-solution-candidate
      - job-shop-rl-training-context
