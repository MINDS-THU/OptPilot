apiVersion: optpilot.io/v1
config: method
id: baseline-file-copy
description: Emits the unmodified files declared by a file-candidate environment.
tags: [baseline, file-candidate, no-api]

entrypoint:
  python: catalog.example_package.methods.baseline_file_copy.method:BaselineFileCopyMethod
  protocol: batch

settings:
  batchSize: 1

accepts:
  formats: [files]
  requires:
    context:
      - candidate.files.editable
