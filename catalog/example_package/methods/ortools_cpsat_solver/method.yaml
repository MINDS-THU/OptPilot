apiVersion: optpilot.io/v1
config: method
id: job-shop-lib-ortools-cpsat
description: Uses JobShopLib ORToolsSolver to emit complete schedule solutions.
tags: [job-shop, job-shop-lib, cp-sat, ortools, schedule-solution]

entrypoint:
  python: method:OrToolsCpSatSolverMethod
  pythonPath: [., ..]
  protocol: batch

settings:
  batchSize: 1
  timeLimitSeconds: 10.0

accepts:
  formats: [parameters]
  requires:
    context:
      - candidate.parameters.schema
    capabilities:
      - schedule-solution-candidate
