apiVersion: optpilot.io/v1
config: environment
id: job-shop-dispatch-rule
description: Evaluate generated Python dispatching rules on small job-shop scheduling cases.
tags: [job-shop, scheduling, files, tutorial]

evaluator:
  python: evaluator:evaluate
  pythonPath: [.]
  timeoutSeconds: 60
  settings:
    cases:
      - id: ft06_small
        path: cases/ft06_small.yaml
      - id: la01_tiny
        path: cases/la01_tiny.yaml
      - id: ft06_standard
        path: cases/ft06_standard.yaml

trialWorkspace:
  - from: template_dispatch_rule
    to: candidate

candidate:
  format: files
  description: Python dispatching rule used by the job-shop scheduling evaluator.
  materialize:
    root: candidate
  files:
    editable:
      - path: dispatch_rule.py
    required:
      - dispatch_rule.py
    allow:
      - dispatch_rule.py

methodContext:
  instructions:
    - prompts/dispatch_rule_system_prompt.md
  references:
    - name: ft06_small
      path: cases/ft06_small.yaml
      type: job_shop_case
      description: Validation case used by the dispatch-rule evaluator.
    - name: la01_tiny
      path: cases/la01_tiny.yaml
      type: job_shop_case
      description: Validation case used by the dispatch-rule evaluator.
    - name: ft06_standard
      path: cases/ft06_standard.yaml
      type: job_shop_case
      description: Larger validation case used by the dispatch-rule evaluator.

metrics:
  source: return
  keys: [makespan, normalized_makespan, tardiness, utilization, feasible, operation_count]

outputFiles:
  - schedule_*.json
  - job_shop_metrics*.json
