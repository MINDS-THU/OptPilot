apiVersion: optpilot.io/v1
config: environment
id: job-shop-schedule-solution-rl
description: Evaluate complete job-shop schedules and expose RL training context to compatible methods.
tags: [job-shop, scheduling, parameters, schedule-solution, reinforcement-learning, tutorial]

evaluator:
  python: evaluator:evaluate
  pythonPath: [.]
  timeoutSeconds: 60
  settings:
    cases:
      - id: ft06_small
        path: cases/ft06_small.yaml
      - id: la01_tiny
        path: cases/la01_tiny.yaml
      - id: ft06_standard
        path: cases/ft06_standard.yaml

candidate:
  format: parameters
  description: Complete schedule solutions keyed by validation case id.
  parameters:
    schema:
      solutions:
        valueType: object
        properties: {}
        description: Mapping from validation case id to a solution object with an operations list.

methodContext:
  references:
    - name: ft06_small
      path: cases/ft06_small.yaml
      type: job_shop_case
      description: Validation case used by the schedule-solution evaluator.
    - name: la01_tiny
      path: cases/la01_tiny.yaml
      type: job_shop_case
      description: Validation case used by the schedule-solution evaluator.
    - name: ft06_standard
      path: cases/ft06_standard.yaml
      type: job_shop_case
      description: Larger validation case used by the schedule-solution evaluator.
    - name: train_tiny_a
      path: training_cases/train_tiny_a.yaml
      type: job_shop_training_case
      description: Training case for RL policy learning.
    - name: train_tiny_b
      path: training_cases/train_tiny_b.yaml
      type: job_shop_training_case
      description: Training case for RL policy learning.
    - name: rl_env_adapter
      path: rl_env_adapter.py
      type: python_module
      description: Environment-owned Gymnasium adapter for job-shop RL methods.

metrics:
  source: return
  keys: [makespan, normalized_makespan, tardiness, utilization, feasible, operation_count]

outputFiles:
  - schedule_*.json
  - job_shop_metrics*.json

capabilities:
  - id: schedule-solution-candidate
    description: Accepts complete schedule solutions keyed by validation case id.
  - id: job-shop-rl-training-context
    description: Provides training cases and a Gymnasium adapter for RL methods.
