apiVersion: optpilot.io/v1
config: environment
id: job-shop-solver-code
description: Evaluate generated Python solver code on small job-shop scheduling cases.
tags: [job-shop, scheduling, files, solver-code, tutorial]

evaluator:
  python: evaluator:evaluate
  pythonPath: [.]
  timeoutSeconds: 60
  settings:
    cases:
      - id: ft06_small
        path: cases/ft06_small.yaml
      - id: la01_tiny
        path: cases/la01_tiny.yaml
      - id: ft06_standard
        path: cases/ft06_standard.yaml

trialWorkspace:
  - from: template_solver
    to: candidate

candidate:
  format: files
  description: Python solver that returns a feasible job-shop schedule.
  materialize:
    root: candidate
  files:
    editable:
      - path: solver.py
    required:
      - solver.py
    allow:
      - solver.py

methodContext:
  instructions:
    - prompts/solver_code_system_prompt.md
  references:
    - name: ft06_small
      path: cases/ft06_small.yaml
      type: job_shop_case
      description: Validation case used by the solver-code evaluator.
    - name: la01_tiny
      path: cases/la01_tiny.yaml
      type: job_shop_case
      description: Validation case used by the solver-code evaluator.
    - name: ft06_standard
      path: cases/ft06_standard.yaml
      type: job_shop_case
      description: Larger validation case used by the solver-code evaluator.

metrics:
  source: return
  keys: [makespan, normalized_makespan, tardiness, utilization, feasible, operation_count]

outputFiles:
  - schedule_*.json
  - job_shop_metrics*.json
