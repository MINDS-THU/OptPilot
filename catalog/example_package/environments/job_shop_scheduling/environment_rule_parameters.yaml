apiVersion: optpilot.io/v1
config: environment
id: job-shop-rule-parameters
description: Evaluate weighted dispatch-rule parameters on small job-shop scheduling cases.
tags: [job-shop, scheduling, parameters, tutorial]

evaluator:
  python: evaluator:evaluate
  pythonPath: [.]
  timeoutSeconds: 60
  settings:
    cases:
      - id: ft06_small
        path: cases/ft06_small.yaml
      - id: la01_tiny
        path: cases/la01_tiny.yaml
      - id: ft06_standard
        path: cases/ft06_standard.yaml

candidate:
  format: parameters
  description: Numeric weights for a priority dispatching rule.
  parameters:
    schema:
      remaining_work_weight:
        valueType: float
        min: -5.0
        max: 5.0
        default: 1.0
        description: Weight for remaining work in the current job.
      processing_time_weight:
        valueType: float
        min: -5.0
        max: 5.0
        default: -1.0
        description: Weight for the candidate operation duration.
      machine_ready_weight:
        valueType: float
        min: -2.0
        max: 2.0
        default: -0.1
        description: Weight for the selected machine ready time.
      job_ready_weight:
        valueType: float
        min: -2.0
        max: 2.0
        default: -0.1
        description: Weight for the selected job ready time.

methodContext:
  references:
    - name: ft06_small
      path: cases/ft06_small.yaml
      type: job_shop_case
      description: Validation case used by the parameter evaluator.
    - name: la01_tiny
      path: cases/la01_tiny.yaml
      type: job_shop_case
      description: Validation case used by the parameter evaluator.
    - name: ft06_standard
      path: cases/ft06_standard.yaml
      type: job_shop_case
      description: Larger validation case used by the parameter evaluator.

metrics:
  source: return
  keys: [makespan, normalized_makespan, tardiness, utilization, feasible, operation_count]

outputFiles:
  - schedule_*.json
  - job_shop_metrics*.json
