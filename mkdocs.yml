site_name: OptPilot
site_url: https://MINDS-THU.github.io/OptPilot/
site_description: Documentation for OptPilot, an orchestrator for AI-assisted iterative optimization studies.
site_author: OptPilot contributors

repo_name: MINDS-THU/OptPilot
repo_url: https://github.com/MINDS-THU/OptPilot
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Model:
      - Concepts: concepts.md
      - Candidate Contracts: candidate-contracts.md
      - Methods: methods.md
      - How A Run Works: how-it-works.md
      - Evidence: evidence.md
  - Job-Shop Tutorial:
      - Overview: examples.md
      - Job-Shop Environment: job-shop-environment.md
      - Dispatching Rule Methods: dispatching-rule-methods.md
      - Simulated Annealing Methods: simulated-annealing-methods.md
      - OR-Tools CP-SAT Methods: cp-sat-methods.md
      - Reinforcement Learning Methods: reinforcement-learning-methods.md
      - LLM Code-Writing Methods: llm-code-methods.md
  - Advanced Integrations:
      - LLM Heuristic Repositories: llm-heuristic-methods.md
      - DEVS-Gen Simulation Environments: devs-gen-simulation-environments.md
  - Reference:
      - Configuration: configuration.md
      - User Catalog: user-catalog.md
  - UI:
      - Current UI: ui.md
      - OptPilot Assistant Design: optpilot-assistant-design.md
      - Platform UI Design: platform-ui-design.md
      - Platform UI Implementation Plan: platform-ui-implementation-plan.md
  - Development: development.md

extra:
  generator: false

copyright: Apache License 2.0
