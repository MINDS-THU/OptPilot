apiVersion: optpilot.io/v1
config: environment
id: toy-factory-cli
description: Toy simulator invoked through a command
tags: [toy, cli]

evaluator:
  pythonPath:
    - ../../../..
  command:
    - "{python}"
    - "-m"
    - "tests.fixtures.catalog.cli_toy_factory_env"
    - "--artifact"
    - "{candidate_json}"
    - "--instance"
    - "{instance_file}"
    - "--output"
    - "{metrics_file}"
    - "--instance-index"
    - "{instance_index}"
  timeoutSeconds: 120

candidate:
  format: parameters
  description: Search parameters accepted by the CLI toy factory evaluator.
  parameters:
    schema:
      x:
        valueType: float
        min: 0.0
        max: 8.0
      y:
        valueType: int
        min: 1
        max: 10
      mode:
        valueType: categorical
        values: [balanced, aggressive, conservative]

metrics:
  source: file
  path: metrics.json
  keys: [throughput, cycle_time]

artifacts:
  - "metrics.json"
  - "stdout_*.log"
  - "stderr_*.log"
