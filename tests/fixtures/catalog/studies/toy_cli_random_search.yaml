apiVersion: optpilot.io/v1
kind: StudyConfig
name: toy-cli-random-search
description: Exercise command-based evaluation with a reference random-search fixture
tags: [mvp, toy, cli, reference-method]

environment: ../environments/toy_factory_cli.yaml
method: ../methods/reference_random_search.yaml

objective:
  metric: throughput
  direction: maximize

instances:
  source: files
  paths:
    - ../instances/toy_factory_case.yaml

budget:
  maxTrials: 12

execution:
  backend: local
  parallelism: 4
  timeoutSeconds: 120

reproducibility:
  seed: 7
