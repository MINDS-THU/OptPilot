apiVersion: optpilot.io/v1
config: method
id: fixed-parameter-method
description: User-owned fixed candidate method
tags: [user-method]

entrypoint:
  python: tests.fixtures.catalog.user_methods.fixed_parameter_method:FixedParameterMethod
  protocol: batch

settings:
  batchSize: 3
  candidates:
    - {x: 4.2, y: 7, mode: balanced}
    - {x: 2.0, y: 4, mode: conservative}
    - {x: 7.5, y: 9, mode: aggressive}

accepts:
  formats: [parameters]
  requires:
    context:
      - candidate.parameters.schema
