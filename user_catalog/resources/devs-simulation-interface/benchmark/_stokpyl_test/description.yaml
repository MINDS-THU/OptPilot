"root_model_name": |-
  Consumer_Electronics_Node
"requirements":
  "general": "### General Implementation Requirements\n1. Language & Environment:\
    \ Python 3.10+, using standard libraries.\n2. Input Interface: Use `argparse`\
    \ for CLI. Read dynamic input from `sys.stdin` line-by-line.\n3. Output Interface:\
    \ \n   - sys.stdout: MUST print strictly valid JSONL objects containing the required\
    \ events.\n   - sys.stderr: Print any debug/progress logs here to avoid contaminating\
    \ stdout.\n4. Time Unit: The underlying simulation base time unit is strictly\
    \ DAYS (Integers). Do not use seconds/milliseconds unless explicitly requested\
    \ by the physical rules."
  "scenario": |-
    1. System Objective: 本场景模拟了一个消费电子产品（智能手机）的三级供应链。中央仓库向工厂订货，分散各地的零售门店向中央仓订货。零售门店将直接面临外部市场的每日需求冲击。
    2. Products Mapping: {'1': 'Smartphone'}
    3. Network Topology & Default Behaviors:
       - Group 'Factory': Role is source, Count is 1.
         * Default Policy: {'type': 'BS', 'base_stock_level': 999999}.
       - Group 'Central_DC': Role is distributor, Count is 1.
         * Lead Time: 3 days.
         * Holding Cost: 1.0/unit.
         * Default Policy: {'type': 'sS', 'reorder_point': 500, 'order_up_to_level': 2000}.
       - Group 'Retailer': Role is retailer, Count is arg:num_retailers.
         * Lead Time: 1 days.
         * Default Policy: {'type': 'BS', 'base_stock_level': 0}.
    4. Specific Edge Connections:
       - {'from_group': 'Factory', 'to_group': 'Central_DC'}
       - {'from_group': 'Central_DC', 'to_group': 'Retailer'}
    5. Custom Dynamics & Fluctuations (Important):
       - 【Retailer 的 demand_func 规则】: [物理定律说明]：
    零售商面临的市场需求完全由外部标准输入流 (stdin) 决定。
    如果在第 N 天，stdin 中有对应的数据，则需求量为该数据；
    如果 stdin 数据耗尽或未提供，则所有零售商每天面临默认的 20 台需求量。
       - 【Retailer 的 policy_func 规则】: [物理定律说明]：
    零售商采用严格的 (s, S) 补货策略。补货点 s 固定为 50，目标库存 S 固定为 150。
    当账面库存 (inventory_position) 小于等于 50 时，向上游发出采购请求。
       - 【Retailer 的 holding_cost_func 规则】: [物理定律说明]：
    零售商的持有成本系数可通过外部参数动态调整。将产品 1 的库存数量乘以动态参数计算得出。
  "args_input_output": "1. CLI Arguments:\n   - `--num_retailers`: Type int, Default:\
    \ 3. 系统中底层零售门店的数量。\n   - `--retailer_holding_cost`: Type float, Default: 2.5.\
    \ 零售门店单位手机每天的仓储成本。\n\n2. Standard Input (stdin):\n   - 多行文本输入。每一行代表一天，包含一个浮点数，表示当天每个零售商面临的市场基础需求量。以空格或换行符分隔。\n\
    \n3. Stdout JSON Schema:\n   You MUST output the following Required Event Types\
    \ using `print(json.dumps(...))`. \n   You MAY output additional event types or\
    \ add extra fields to the required events for debugging. The evaluator will strictly\
    \ filter and grade ONLY the required types and fields.\n   Note: Every required\
    \ event MUST implicitly contain `time` (int, current day) and `node` (str, instance\
    \ name like 'Retailer_0').\n\n   Required Events:\n   - Event: `DAILY_SUMMARY`\n\
    \     Description: 每天结束时记录的节点期末状态总结。\n     Required Fields (besides time and node):\n\
    \       * `inventory_qty` (float): 期末 Smartphone 的实物库存数量。\n       * `holding_cost`\
    \ (float): 当日产生的仓储费用。\n   - Event: `SHORTAGE_OCCURRED`\n     Description: 当节点面临下游或外部需求，但库存不足以全额满足时触发。\n\
    \     Required Fields (besides time and node):\n       * `missed_qty` (float):\
    \ 当日未能满足而转化为欠单缺货的数量（必定大于 0）。"
