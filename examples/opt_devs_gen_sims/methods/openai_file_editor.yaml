apiVersion: optpilot.io/v3alpha1
kind: MethodConfig
id: openai-sa-file-editor
description: User-owned LLM engine that edits selected files in the SA simulator
tags: [user-engine, llm, code-edit, external-project]

controller:
  implementation: builtin.single_engine_controller
  config:
    engineId: sa_editor

engine:
  id: sa_editor
  implementation: python:examples.opt_devs_gen_sims.user_engines.openai_file_edit_engine:OpenAIFileEditEngine
  config:
    batchSize: 1
    provider: openrouter
    model: openai/gpt-4.1-mini
    temperature: 0.2
    maxTokens: 4000
    apiKeyEnvVar: OPENROUTER_API_KEY
    apiBase: https://openrouter.ai/api/v1/chat/completions
    sourceDir: ../../../resource/devs_gen_gallery/simulators/SA/simulator
    systemPromptPath: ../prompts/sa_file_edit_system_prompt.md
    includeBaselineCandidate: true
    targetFiles:
      - devs_project/StrategicAirlift_D0_libs/Aircraft_libs/MissionController.py