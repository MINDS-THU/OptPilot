apiVersion: optpilot.io/v1
config: environment
id: job-shop-solver-code
description: Evaluate generated Python solver code on small job-shop scheduling instances.
tags: [job-shop, scheduling, files, solver-code, tutorial]

evaluator:
  python: examples.environments.job_shop_scheduling.evaluator:evaluate
  timeoutSeconds: 60

trialWorkspace:
  - from: template_solver
    to: candidate

candidate:
  format: files
  description: Python solver that returns a feasible job-shop schedule.
  materialize:
    root: candidate
  files:
    editable:
      - path: solver.py
    required:
      - solver.py
    allow:
      - solver.py

methodContext:
  instructions:
    - prompts/solver_code_system_prompt.md

metrics:
  source: return
  keys: [makespan, normalized_makespan, tardiness, utilization, feasible, operation_count]

outputFiles:
  - schedule.json
  - job_shop_metrics.json
