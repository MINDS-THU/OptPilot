apiVersion: optpilot.io/v1
config: study
name: job-shop-local-heuristic-search
description: Run the heuristic-search adapter against a local command that emits dispatch_rule.py.
tags: [job-shop, llm-method, heuristic-search, dispatch-rule, files]

environmentConfig: ../environments/job_shop_scheduling/environment_dispatch_rule.yaml
methodConfig: ../methods/llm_heuristic_search/local_job_shop_dispatch_command.yaml

objective:
  metric: normalized_makespan
  direction: minimize
  secondaryMetrics: [makespan, tardiness, utilization]

budget:
  maxTrials: 1

execution:
  backend: local
  parallelism: 1
  timeoutSeconds: 60

evidence:
  level: full

reproducibility:
  seed: 0
