apiVersion: optpilot.io/v3alpha1
kind: StudyConfig
name: toy-user-engine
description: Exercise a user-owned engine loaded through the python component hook
tags: [mvp, toy, user-engine]

environment: ../environments/toy_factory.yaml
method: ../methods/fixed_parameter_engine.yaml

objective:
  metric: throughput
  direction: maximize

instances:
  source: files
  paths:
    - ../instances/toy_factory_case.yaml

budget:
  maxTrials: 3

execution:
  backend: local
  parallelism: 3
  timeoutSeconds: 120

reproducibility:
  seed: 7
