apiVersion: optpilot.io/v1
config: method
id: openai-sa-file-editor
description: User-owned LLM method that edits selected files in the SA simulator
tags: [user-method, llm, code-edit, external-project]

entrypoint:
  python: examples.methods.openai_file_editor.method:OpenAIFileEditMethod
  protocol: batch

settings:
  batchSize: 1
  provider: openrouter
  model: openai/gpt-4.1-mini
  temperature: 0.2
  maxTokens: 4000
  apiKeyEnvVar: OPENROUTER_API_KEY
  apiBase: https://openrouter.ai/api/v1/chat/completions
  includeBaselineCandidate: true

accepts:
  formats: [files]
  requires:
    context:
      - candidate.files.editable
      - methodContext.instructions
