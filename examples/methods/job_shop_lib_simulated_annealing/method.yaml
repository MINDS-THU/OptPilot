apiVersion: optpilot.io/v1
config: method
id: job-shop-lib-simulated-annealing
description: Emits a solver.py candidate that calls JobShopLib SimulatedAnnealingSolver.
tags: [job-shop, job-shop-lib, simulated-annealing, solver-code]

entrypoint:
  python: examples.methods.job_shop_lib_simulated_annealing.method:JobShopLibSimulatedAnnealingMethod
  protocol: batch

settings:
  batchSize: 1
  initialTemperature: 2500.0
  endingTemperature: 2.5
  steps: 1000
  updates: 0
  seed: 0

accepts:
  formats: [files]
  requires:
    context:
      - candidate.files.editable
