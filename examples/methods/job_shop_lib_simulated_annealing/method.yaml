apiVersion: optpilot.io/v1
config: method
id: job-shop-lib-simulated-annealing
description: Uses JobShopLib SimulatedAnnealingSolver to emit complete schedule solutions.
tags: [job-shop, job-shop-lib, simulated-annealing, schedule-solution]

entrypoint:
  python: examples.methods.job_shop_lib_simulated_annealing.method:JobShopLibSimulatedAnnealingMethod
  protocol: batch

settings:
  batchSize: 1
  initialTemperature: 2500.0
  endingTemperature: 2.5
  steps: 1000
  updates: 0
  seed: 0

accepts:
  formats: [parameters]
  requires:
    context:
      - candidate.parameters.schema

produces:
  format: parameters
  parameters:
    schema:
      solutions:
        valueType: object
        properties: {}
