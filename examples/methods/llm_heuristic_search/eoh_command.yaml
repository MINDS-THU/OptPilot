apiVersion: optpilot.io/v1
config: method
id: eoh-llm-heuristic-search
description: Thin OptPilot wrapper for an upstream EoH run that produces one heuristic file.
tags: [upstream-project, llm-method, eoh, heuristic-search]

entrypoint:
  python: examples.methods.llm_heuristic_search.method:LLMHeuristicSearchMethod
  protocol: batch

settings:
  command:
    - "{python}"
    - run_eoh.py
    - --request
    - "{request_file}"
    - --output-dir
    - "{method_workspace}"
  repoRoot: ../../../resource/EOH
  workdir: ../../../resource/EOH
  generatedFile: best_heuristic.py
  upstreamRepository: https://github.com/FeiLiu36/EoH
  timeoutSeconds: 1800

accepts:
  formats: [files]
  requires:
    context:
      - candidate.files.editable