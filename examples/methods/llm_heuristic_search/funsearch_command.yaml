apiVersion: optpilot.io/v1
config: method
id: funsearch-llm-heuristic-search
description: Thin OptPilot wrapper for a FunSearch run that produces one heuristic file.
tags: [upstream-project, llm-method, funsearch, heuristic-search]

entrypoint:
  python: examples.methods.llm_heuristic_search.method:LLMHeuristicSearchMethod
  protocol: batch

settings:
  command:
    - "{python}"
    - run_funsearch.py
    - --request
    - "{request_file}"
    - --output-dir
    - "{method_workspace}"
  repoRoot: ../../../resource/funsearch
  workdir: ../../../resource/funsearch
  generatedFile: best_heuristic.py
  upstreamRepository: https://github.com/google-deepmind/funsearch
  timeoutSeconds: 1800

accepts:
  formats: [files]
  requires:
    context:
      - candidate.files.editable