apiVersion: optpilot.io/v1
config: method
id: eohs-llm-heuristic-search
description: Thin OptPilot wrapper for an upstream EoH-S run that produces one heuristic-set file.
tags: [upstream-project, llm-method, eoh-s, heuristic-search]

entrypoint:
  python: examples.methods.llm_heuristic_search.method:LLMHeuristicSearchMethod
  protocol: batch

settings:
  command:
    - "{python}"
    - examples/obp_set/run_eohs.py
  repoRoot: ../../../resource/EoH-S
  workdir: ../../../resource/EoH-S
  generatedFile: logs/eohs/best_heuristic.py
  upstreamRepository: https://github.com/FeiLiu36/EoH-S
  timeoutSeconds: 1800

accepts:
  formats: [files]
  requires:
    context:
      - candidate.files.editable