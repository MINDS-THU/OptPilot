name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install source checkout
        run: python -m pip install -e . -e ./studio

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Compile package
        run: python -m compileall src/optpilot

      - name: Compile Studio package
        run: python -m compileall studio/src/optpilot_studio

      - name: Run smoke tests
        run: ./scripts/smoke_test.sh
